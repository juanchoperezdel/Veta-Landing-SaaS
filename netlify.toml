# Blog proxy (veta-blog en Netlify)
[[redirects]]
  from = "/blog/*"
  to = "https://veta-blog.netlify.app/blog/:splat"
  status = 200

[[redirects]]
  from = "/_astro/*"
  to = "https://veta-blog.netlify.app/_astro/:splat"
  status = 200

[[redirects]]
  from = "/sitemap-index.xml"
  to = "https://veta-blog.netlify.app/sitemap-index.xml"
  status = 200

[[redirects]]
  from = "/sitemap-0.xml"
  to = "https://veta-blog.netlify.app/sitemap-0.xml"
  status = 200
